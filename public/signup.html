<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UCC Knowledge Hub — Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:hsl(220,40%,7%);
  --fg:hsl(45,30%,92%);
  --primary:hsl(43,55%,54%);
  --card:hsl(220,35%,11%);
  --muted:hsl(220,15%,55%);
  --border:hsl(220,25%,18%);
  --secondary:hsl(220,30%,16%);
  --red:hsl(0,70%,60%);
  --glow:0 0 40px hsla(43,55%,54%,0.3);
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
}

body{
  background:var(--bg);
  color:var(--fg);
  font-family:var(--font-body);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:url('https://www.ucc.edu.jm/sites/default/files/Campus%20Image%202.jpg') center/cover;
  opacity:.4;
}
.overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(to right,rgba(0,0,0,.85),rgba(0,0,0,.6));
}

/* HEADER */
    .site-header { position:relative; z-index:10; background:hsla(220,35%,11%,0.6); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
    .header-inner { max-width:1280px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:12px 24px; gap:16px; }
    .logo-wrap { display:flex; align-items:center; gap:12px; }
    .ucc-logo  { height:40px; width:40px; border-radius:50%; }
    .title-wrap h1       { font-family:var(--font-display); font-size:1.125rem; font-weight:700; }
    .title-wrap .subtitle { font-size:0.75rem; color:var(--muted); }
    .main-nav { display:flex; gap:8px; }
    .main-nav a { font-size:0.875rem; color:var(--muted); padding:7px 14px; border-radius:8px; text-decoration:none; transition:all .2s; }
    .main-nav a:hover { color:var(--fg); background:var(--secondary); }

/* CARD */
.container{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  z-index:10;
}
.card{
  background:rgba(20,20,30,.8);
  backdrop-filter:blur(20px);
  padding:40px;
  border-radius:20px;
  width:100%;
  max-width:420px;
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

.card h2{
  text-align:center;
  font-family:var(--font-display);
  margin-bottom:20px;
}
.card h2 span{color:var(--primary);}

/* INPUTS */
.input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--secondary);
  color:var(--fg);
}
.input:focus{border-color:var(--primary);outline:none;}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  font-weight:700;
  cursor:pointer;
}
button:hover{box-shadow:var(--glow);}

/* EXTRA */
.extra{
  text-align:center;
  margin-top:15px;
  color:var(--muted);
}
.extra a{
  color:var(--primary);
  text-decoration:none;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  font-size:.8rem;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

 <header class="site-header">
    <div class="header-inner">
      <div class="logo-wrap">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSEC31GlH03Kf6NAmmiIHqInFd0q1bQz2gmDg&s" alt="UCC logo" class="ucc-logo">
        <div class="title-wrap">
          <h1>UCC Knowledge Hub</h1>
          <p class="subtitle">Empowering Digital Learning</p>
        </div>
      </div>
      <nav class="main-nav">
        <a href="ucc_landing_page.html">Home</a>
      </nav>
    </div>
  </header>

<div class="container">
  <div class="card">
    <h2>Create <span>Account</span></h2>

    <form id="signupForm">
      <input class="input" type="text" id="fullname" placeholder="Full Name" required>
      <input class="input" type="email" id="email" placeholder="Email" required>
      <input class="input" type="number" id="schoolId" placeholder="School ID" required>
      <input class="input" type="password" id="password" placeholder="Password" required>

      <button type="submit">Sign Up</button>
    </form>

    <p id="result"></p>

    <div class="extra">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>
</div>

<footer>
  © <span id="year"></span> UCC Knowledge Hub
</footer>

<script>
document.getElementById("year").textContent=new Date().getFullYear();

document.getElementById("signupForm").addEventListener("submit",async e=>{
  e.preventDefault();

  const fullname=document.getElementById("fullname").value;
  const email=document.getElementById("email").value;
  const schoolId=document.getElementById("schoolId").value;
  const password=document.getElementById("password").value;

  const res=await fetch("/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({fullname,email,schoolId,password})
  });

  const data=await res.json();
  document.getElementById("result").textContent=data.message;
});
</script>

</body>
</html>
